name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout MoneroKit.Swift
        uses: actions/checkout@v6
        with:
          repository: bwgh0/MoneroKit.Swift
          path: MoneroKit.Swift

      - name: Fix MoneroKit path for CI
        run: |
          sed -i '' 's|\.\./MoneroKit\.Swift|MoneroKit.Swift|g' MoneroOne.xcodeproj/project.pbxproj

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MoneroOne.xcodeproj \
            -scheme MoneroOne

      - name: Build for simulator
        run: |
          xcodebuild -project MoneroOne.xcodeproj \
            -scheme MoneroOne \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -configuration Debug \
            build

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project MoneroOne.xcodeproj \
            -scheme MoneroOne \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -only-testing:MoneroOneTests
