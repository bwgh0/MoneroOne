name: Deploy to TestFlight

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout MoneroKit.Swift
        uses: actions/checkout@v6
        with:
          repository: bwgh0/MoneroKit.Swift
          path: MoneroKit.Swift

      - name: Fix MoneroKit path for CI
        run: |
          sed -i '' 's|\.\./MoneroKit\.Swift|MoneroKit.Swift|g' MoneroOne.xcodeproj/project.pbxproj

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"           # v1.0.3-1
          VERSION="${TAG%-*}"                 # v1.0.3
          VERSION="${VERSION#v}"              # 1.0.3
          BUILD="${TAG##*-}"                  # 1

          echo "Version: $VERSION  Build: $BUILD"

          # Update Info.plists
          plutil -replace CFBundleShortVersionString -string "$VERSION" MoneroOne/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD" MoneroOne/Info.plist
          plutil -replace CFBundleShortVersionString -string "$VERSION" MoneroOneWidgets/Info.plist
          plutil -replace CFBundleVersion -string "$BUILD" MoneroOneWidgets/Info.plist

          # Update pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD/g" MoneroOne.xcodeproj/project.pbxproj
          sed -i '' "s/MARKETING_VERSION = [0-9.]*/MARKETING_VERSION = $VERSION/g" MoneroOne.xcodeproj/project.pbxproj

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install App Store Connect API Key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MoneroOne.xcodeproj \
            -scheme MoneroOne

      - name: Build and Archive
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -project MoneroOne.xcodeproj \
            -scheme MoneroOne \
            -destination "generic/platform=iOS" \
            -archivePath build/MoneroOne.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

      - name: Export IPA for sideloading
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MoneroOne.xcarchive \
            -exportPath build/release \
            -exportOptionsPlist ExportOptions-Dev.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_ISSUER_ID"

      - name: Generate SHA-256 hash
        run: |
          cd build/release
          shasum -a 256 MoneroOne.ipa > SHA256SUMS.txt
          echo "SHA-256 hash:"
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/MoneroOne.ipa
            build/release/SHA256SUMS.txt
          generate_release_notes: true

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          max_attempts=5
          attempt=1
          backoff=30

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt of $max_attempts..."

            if xcodebuild -exportArchive \
              -archivePath build/MoneroOne.xcarchive \
              -exportPath build/export \
              -exportOptionsPlist ExportOptions.plist \
              -allowProvisioningUpdates \
              -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
              -authenticationKeyID "$API_KEY_ID" \
              -authenticationKeyIssuerID "$API_ISSUER_ID"; then
              echo "Upload succeeded!"
              break
            fi

            if [ $attempt -lt $max_attempts ]; then
              echo "Upload failed. Retrying in ${backoff}s..."
              sleep $backoff
              backoff=$((backoff * 2))
              rm -rf build/export
            fi

            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "All $max_attempts attempts failed."
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: ~/Library/Logs/DiagnosticReports/
          if-no-files-found: ignore
